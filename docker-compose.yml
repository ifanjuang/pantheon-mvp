services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mvp
      POSTGRES_PASSWORD: mvp
      POSTGRES_DB: mvp
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mvp -d mvp"]
      interval: 2s
      timeout: 2s
      retries: 15

  docling:
    image: quay.io/docling-project/docling-serve-cpu:v1.21.0
    profiles: ["documents"]
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      DOCLING_SERVE_ENABLE_UI: "0"
    restart: unless-stopped
