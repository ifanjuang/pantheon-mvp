services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mvp
      POSTGRES_PASSWORD: mvp
      POSTGRES_DB: mvp
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mvp -d mvp"]
      interval: 2s
      timeout: 2s
      retries: 15
