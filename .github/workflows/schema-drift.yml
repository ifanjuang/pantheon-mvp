name: Schema drift monitor

# Report-only. Runs on a schedule (and on demand), NOT on pull_request, so it
# never gates a merge. It tells us when the vendored governance schema falls
# structurally behind Pantheon-Next and a re-vendoring is due.
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install PyYAML
      - name: Check vendored schema against upstream
        run: python tools/check_schema_drift.py
