name: Pantheon MVP CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mvp
          POSTGRES_PASSWORD: mvp
          POSTGRES_DB: mvp
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U mvp -d mvp"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[test]"
      - run: pytest -v
        env:
          MVP_PG_DSN: postgresql://mvp:mvp@localhost:5433/mvp
