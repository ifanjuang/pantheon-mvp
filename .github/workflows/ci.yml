name: Pantheon MVP CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[test]"
      - name: Static cockpit and API shell contracts
        run: pytest -q --tb=short tests/test_cockpit_assets.py tests/test_cockpit_shell.py
      - name: Proposal-only effect contracts
        run: pytest -q --tb=short tests/test_effect_guard.py tests/test_effect_preview.py
      - name: Knowledge UPDATE unit contracts
        run: pytest -q --tb=short tests/test_knowledge_update.py
      - name: Knowledge UPDATE idempotency contract
        run: pytest -q --tb=short tests/test_knowledge_update_idempotency.py
      - name: Knowledge UPDATE API contracts
        run: pytest -q --tb=short tests/test_knowledge_update_routes.py
      - name: Retired legacy write contract
        run: pytest -q --tb=short tests/test_legacy_knowledge_revision_retired.py
      - name: Resource profile contracts
        run: pytest -q --tb=short tests/test_resource_profiles.py

  tests:
    needs: contract-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15   # a hung test fails fast instead of running to the 6h limit
    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mvp
          POSTGRES_PASSWORD: mvp
          POSTGRES_DB: mvp
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U mvp -d mvp"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[test]"
      - run: pytest -q --tb=short
        env:
          MVP_PG_DSN: postgresql://mvp:mvp@localhost:5433/mvp
