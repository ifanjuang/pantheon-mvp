name: Vendor Radix Icons once

on:
  pull_request:
    branches:
      - agent/vendor-radix-icons
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  vendor:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/vendor-radix-icons
          fetch-depth: 0

      - name: Fetch pinned Radix icon set
        shell: bash
        run: |
          set -euo pipefail
          upstream='112af91ad275a63c3a29b0da2588342af74ef9bf'
          vendor='mvp_vertical/cockpit/vendor/radix-icons'
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          curl --fail --location --retry 3 \
            "https://raw.githubusercontent.com/radix-ui/icons/${upstream}/radix-icons.zip" \
            --output "$tmp/radix-icons.zip"
          curl --fail --location --retry 3 \
            "https://raw.githubusercontent.com/radix-ui/icons/${upstream}/packages/radix-icons/manifest.json" \
            --output "$tmp/manifest.json"

          mkdir -p "$tmp/extracted"
          unzip -q "$tmp/radix-icons.zip" -d "$tmp/extracted"

          expected="$(jq '.icons[":15"] | length' "$tmp/manifest.json")"
          actual="$(find "$tmp/extracted" -maxdepth 1 -type f -name '*.svg' | wc -l | tr -d ' ')"
          test "$actual" = "$expected"

          mkdir -p "$vendor/icons"
          rm -f "$vendor/icons"/*.svg
          cp "$tmp/extracted"/*.svg "$vendor/icons/"
          cp "$tmp/manifest.json" "$vendor/manifest.json"

          printf 'Vendored %s Radix SVG icons from %s\n' "$actual" "$upstream"

      - name: Commit vendored snapshot
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- mvp_vertical/cockpit/vendor/radix-icons; then
            echo 'No vendor changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add mvp_vertical/cockpit/vendor/radix-icons
          git commit -m 'Vendor complete pinned Radix icon set'
          git push origin HEAD:agent/vendor-radix-icons
