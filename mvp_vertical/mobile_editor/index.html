<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#17231d">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <title>Pantheon Knowledge</title>
</head>
<body>
  <header>
    <div><small>PANTHEON</small><h1>Knowledge</h1></div>
    <output id="network" aria-live="polite">hors ligne</output>
  </header>
  <main>
    <section class="connect card">
      <label>Projet <input id="project" autocomplete="off" placeholder="project-maison-a"></label>
      <label>Clé d’édition <input id="token" type="password" autocomplete="off" placeholder="conservée pour cette session"></label>
      <button id="load">Ouvrir</button>
    </section>
    <section class="workspace">
      <nav class="card">
        <h2>Sujets</h2>
        <div id="items"><p class="muted">Aucun sujet chargé.</p></div>
      </nav>
      <article class="card editor">
        <div class="meta">
          <div><h2 id="title">Sélectionnez un sujet</h2><p id="status" class="muted"></p></div>
          <button id="save" disabled>Synchroniser</button>
        </div>
        <div class="actions" aria-label="Actions sur la sélection">
          <button data-action="rewrite" disabled>Reformuler</button>
          <button data-action="expand" disabled>Détailler</button>
          <button data-action="simplify" disabled>Simplifier</button>
          <button data-action="verify" disabled>Vérifier</button>
          <button data-action="move_to_lot" disabled>Changer de lot</button>
        </div>
        <textarea id="markdown" spellcheck="true" disabled placeholder="Markdown Knowledge"></textarea>
        <p id="message" role="status" class="muted"></p>
      </article>
    </section>
  </main>
  <script src="app.js" defer></script>
</body>
</html>
