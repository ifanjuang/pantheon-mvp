<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#151618">
  <link rel="stylesheet" href="styles/index.css">
  <title>Pantheon Cockpit</title>
</head>
<body>
  <header class="app-header">
    <a class="brand" href="./" aria-label="Pantheon Cockpit">
      <span class="brand-mark" aria-hidden="true">P</span>
      <span><small>PANTHEON</small><strong>COCKPIT</strong></span>
    </a>
    <output id="network" class="network-pill" aria-live="polite">hors ligne</output>
  </header>

  <main class="app-shell">
    <section class="connection-panel" aria-labelledby="connection-title">
      <div>
        <p class="eyebrow">AFFAIRE</p>
        <h1 id="connection-title">Ouvrir une affaire</h1>
        <p class="supporting-copy">La clé reste en mémoire de session. Le cockpit affiche des projections ; il ne transforme pas une carte en source, preuve ou décision.</p>
      </div>
      <label>
        <span>Affaire / projet</span>
        <input id="project" autocomplete="off" placeholder="project-maison-a">
      </label>
      <label>
        <span>Clé d’accès</span>
        <input id="token" type="password" autocomplete="off" placeholder="lecture ou édition">
      </label>
      <button id="load" class="primary-action" type="button">Ouvrir</button>
    </section>

    <nav class="scene-rail" aria-label="Espaces du cockpit">
      <button class="scene-tab is-active" data-space="pantheon" type="button">Pantheon</button>
      <button class="scene-tab" data-space="affaires" type="button">Affaires</button>
      <button class="scene-tab" data-space="connaissances" type="button">Connaissances</button>
      <button class="scene-tab" data-space="outils" type="button">Outils</button>
      <button class="scene-tab" data-space="decisions" type="button">Décisions</button>
    </nav>

    <section class="scene-heading" aria-live="polite">
      <div>
        <p id="scene-eyebrow" class="eyebrow">PANTHEON</p>
        <h2 id="scene-title">Contexte et attention</h2>
      </div>
      <p id="scene-status" class="scene-status">Ouvrez une affaire pour construire un contexte explicite.</p>
    </section>

    <section id="deck" class="card-deck" aria-label="Pile de cartes"></section>
  </main>

  <dialog id="detail-dialog" class="detail-dialog" aria-labelledby="detail-title">
    <form method="dialog" class="detail-shell">
      <header class="detail-header">
        <div id="detail-kind" class="type-lockup"></div>
        <button class="icon-button" value="close" aria-label="Fermer"><span class="radix-icon" data-icon="close" aria-hidden="true"></span></button>
      </header>
      <div id="detail-content" class="detail-content"></div>
    </form>
  </dialog>

  <template id="empty-template">
    <article class="empty-state">
      <p class="eyebrow">AUCUNE CARTE</p>
      <h3>Rien à afficher dans cette vue.</h3>
      <p>Le cockpit n’invente pas d’objet absent.</p>
    </article>
  </template>

  <script src="app.js" defer></script>
  <script src="resources.js" defer></script>
  <script src="effects.js" defer></script>
  <script src="knowledge_updates.js" defer></script>
  <script src="information_architecture.js" defer></script>
  <script src="capability_reconciliation.js" defer></script>
</body>
</html>
