$schema: "https://json-schema.org/draft/2020-12/schema"
title: Pantheon Next MVP Governed Loop Objects
description: Candidate schema bundle for the five central MVP governed task loop objects. Declarative only; no runtime, approval engine or memory promotion.
type: object
required:
  - object_type
  - object_id
  - status
properties:
  object_type:
    type: string
    enum:
      - task_contract
      - result_candidate
      - evidence_pack_candidate
      - decision_record
      - register_candidate
  object_id:
    type: string
    pattern: "^[a-z0-9._-]+$"
  status:
    type: string
    minLength: 3
  governance_refs:
    type: array
    items:
      type: string
    default:
      - docs/governance/MVP_GOVERNED_TASK_LOOP.md
      - docs/governance/MVP_VERTICAL_IMPLEMENTATION_PLAN.md
      - docs/governance/USER_DECISION_GATE.md
oneOf:
  - $ref: "#/$defs/task_contract"
  - $ref: "#/$defs/result_candidate"
  - $ref: "#/$defs/evidence_pack_candidate"
  - $ref: "#/$defs/decision_record"
  - $ref: "#/$defs/register_candidate"
$defs:
  string_list:
    type: array
    items:
      type: string
  source_ref:
    type: object
    required:
      - source_ref
    properties:
      source_ref:
        type: string
      title:
        type: string
      traceable:
        type: boolean
    additionalProperties: true
  task_contract:
    type: object
    required:
      - object_type
      - object_id
      - status
      - requested_by
      - approval_ceiling
      - scope
      - expected_outputs
    properties:
      object_type:
        const: task_contract
      object_id:
        type: string
        pattern: "^[a-z0-9._-]+$"
      contract_id:
        type: string
      status:
        type: string
      requested_by:
        type: string
      exposure_surface:
        type: string
      consequence_class:
        type: string
      approval_ceiling:
        type: string
      intent:
        type: object
        additionalProperties: true
      scope:
        type: object
        required:
          - declared_sources
        properties:
          declared_sources:
            type: array
            items:
              $ref: "#/$defs/source_ref"
          forbidden_sources:
            $ref: "#/$defs/string_list"
        additionalProperties: true
      expected_outputs:
        $ref: "#/$defs/string_list"
      retrieval_boundary:
        type: object
        additionalProperties: true
      governance_refs:
        $ref: "#/$defs/string_list"
    additionalProperties: true
  result_candidate:
    type: object
    required:
      - object_type
      - object_id
      - status
      - body
      - external_action_authorized
    properties:
      object_type:
        const: result_candidate
      object_id:
        type: string
        pattern: "^[a-z0-9._-]+$"
      result_candidate_id:
        type: string
      status:
        type: string
      revision_of:
        type: string
      produced_by:
        type: string
      body:
        type: string
        minLength: 1
      commitment_flags:
        type: array
        items:
          type: string
      limits:
        $ref: "#/$defs/string_list"
      external_action_authorized:
        type: boolean
      governance_refs:
        $ref: "#/$defs/string_list"
    additionalProperties: true
  evidence_pack_candidate:
    type: object
    required:
      - object_type
      - object_id
      - status
      - applies_to
      - evidence_items
      - possible_decisions
    properties:
      object_type:
        const: evidence_pack_candidate
      object_id:
        type: string
        pattern: "^[a-z0-9._-]+$"
      evidence_pack_id:
        type: string
      status:
        type: string
      applies_to:
        type: string
      evidence_items:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - claim
            - source_ref
            - support_status
          properties:
            claim:
              type: string
            source_ref:
              type: string
            retrieval_trace:
              type: string
            support_status:
              type: string
          additionalProperties: true
      risks:
        type: array
        items:
          type: object
          additionalProperties: true
      possible_decisions:
        type: array
        minItems: 1
        items:
          type: string
      governance_refs:
        $ref: "#/$defs/string_list"
    additionalProperties: true
  decision_record:
    type: object
    required:
      - object_type
      - object_id
      - status
      - applies_to
      - decision
      - decided_by
      - decision_surface
      - consequences
    properties:
      object_type:
        const: decision_record
      object_id:
        type: string
        pattern: "^[a-z0-9._-]+$"
      decision_id:
        type: string
      status:
        type: string
      applies_to:
        type: string
      related_evidence_pack:
        type: string
      decision:
        type: string
      decided_by:
        type: string
      decision_surface:
        type: string
      rationale:
        type: string
      consequences:
        type: object
        additionalProperties: true
      governance_refs:
        $ref: "#/$defs/string_list"
    additionalProperties: true
  register_candidate:
    type: object
    required:
      - object_type
      - object_id
      - status
      - created_because_of
      - statement
      - scope
      - not_memory_until_admitted
    properties:
      object_type:
        const: register_candidate
      object_id:
        type: string
        pattern: "^[a-z0-9._-]+$"
      candidate_id:
        type: string
      status:
        type: string
      created_because_of:
        type: string
      statement:
        type: string
      scope:
        type: string
      basis:
        $ref: "#/$defs/string_list"
      not_memory_until_admitted:
        type: boolean
        const: true
      forbidden_reuse:
        $ref: "#/$defs/string_list"
      governance_refs:
        $ref: "#/$defs/string_list"
    additionalProperties: true
additionalProperties: true
x-boundary:
  runtime_execution: false
  autonomous_loop: false
  provider_routing: false
  scheduler: false
  queue_system: false
  message_bus: false
  automatic_dispatch: false
  memory_promotion: false
  automatic_approval: false
